<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3b82f6",
                        "deep-dark": "#0f1115",
                        "surface-dark": "#1a1c22",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "1.5rem", "xl": "2rem", "full": "9999px"},
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            background-color: #0f1115;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-deep-dark font-display text-white selection:bg-primary/30">
<div class="relative flex h-screen w-full flex-col max-w-md mx-auto overflow-hidden">
<header class="flex flex-col gap-1 p-8 pb-4">
<div class="flex items-center justify-between mb-2">
<div class="flex items-center gap-2">
<span class="text-3xl">🧠</span>
<span class="text-sm font-semibold tracking-wider text-white/40 uppercase">SuperBrain</span>
</div>
</div>
<h1 class="text-white tracking-tight text-3xl font-bold leading-tight">Settings</h1>
</header>
<main class="flex-1 flex flex-col px-8 pt-6">
<div class="flex flex-col gap-6">
<div class="space-y-4">
<div class="flex items-center gap-2 text-white/60">
<span class="material-symbols-outlined text-sm">key</span>
<h2 class="text-sm font-medium uppercase tracking-widest">API Configuration</h2>
</div>
<div class="bg-surface-dark border border-white/5 p-6 rounded-2xl shadow-xl">
<div class="space-y-4">
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-white/70 ml-1" for="api-key">Enter API Key</label>
<input class="w-full bg-deep-dark border-none rounded-xl py-4 px-4 text-white placeholder:text-white/20 focus:ring-2 focus:ring-primary transition-all shadow-inner" id="api-key" placeholder="sk-••••••••••••••••" type="password"/>
</div>
<button class="w-full bg-white text-deep-dark font-bold py-4 rounded-xl hover:bg-white/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-lg shadow-white/5">
<span class="material-symbols-outlined text-[20px]">save</span>
                                Save Changes
                            </button>
</div>
<p class="mt-4 text-xs text-white/30 text-center leading-relaxed">
                            Your API key is stored locally on your device and never shared with our servers.
                        </p>
</div>
</div>
<div class="mt-auto pb-24 text-center opacity-20">
<p class="text-xs font-medium tracking-widest uppercase">SuperBrain v3.0</p>
</div>
</div>
</main>
<nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-surface-dark/80 ios-blur border-t border-white/5 px-8 pb-8 pt-3">
<div class="flex justify-between items-center">
<a class="flex flex-col items-center gap-1 text-white/40 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined">dynamic_feed</span>
<span class="text-[10px] font-medium">All Posts</span>
</a>
<a class="flex flex-col items-center gap-1 text-white/40 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined">auto_stories</span>
<span class="text-[10px] font-medium">Library</span>
</a>
<a class="flex flex-col items-center gap-1 text-white" href="#">
<span class="material-symbols-outlined fill-[1]">settings</span>
<span class="text-[10px] font-medium">Settings</span>
</a>
</div>
<div class="w-32 h-1 bg-white/10 rounded-full mx-auto mt-6"></div>
</nav>
</div>

</body></html>
