<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SuperBrain - Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffffff",
                        "charcoal": "#121212",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            -webkit-tap-highlight-color: transparent;
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-charcoal font-display antialiased text-white overflow-hidden">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center">
<div class="flex flex-col items-center justify-center space-y-6 px-6 z-10">
<div class="relative flex h-32 w-32 items-center justify-center">
<div class="absolute inset-0 bg-white/5 blur-[60px] rounded-full"></div>
<div class="relative text-7xl select-none">
                    🧠
                </div>
</div>
<div class="text-center">
<h1 class="text-4xl font-bold tracking-tight text-white mb-2">
                    SuperBrain
                </h1>
<p class="text-base font-medium text-gray-500 tracking-wide">
                    Save it. See it. Do it.
                </p>
</div>
</div>
<div class="absolute bottom-20 w-full max-w-[200px] px-4">
<div class="flex flex-col gap-4">
<div class="h-1 w-full rounded-full bg-white/10 overflow-hidden">
<div class="h-full rounded-full bg-white/40" style="width: 40%;"></div>
</div>
<div class="flex justify-center">
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-600">
                        Loading
                    </span>
</div>
</div>
</div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 h-[500px] w-[500px] rounded-full bg-white/[0.02] blur-[100px]"></div>
</div>
<div class="fixed top-0 w-full h-12 flex items-center justify-between px-8 text-xs font-semibold text-white/40">
<span>9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-[16px]">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[16px]">wifi</span>
<div class="w-6 h-3 border border-white/30 rounded-sm relative ml-0.5">
<div class="absolute inset-0.5 bg-white/60 rounded-[1px] w-[70%]"></div>
</div>
</div>
</div>
<div class="fixed bottom-2 left-1/2 -translate-x-1/2 w-32 h-1 bg-white/20 rounded-full"></div>

</body></html>
