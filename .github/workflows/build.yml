name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Python Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          # Fail on syntax errors or undefined names only
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues without failing
          flake8 backend/ --count --exit-zero --max-line-length=120 --statistics

      - name: Run backend tests
        run: |
          cd backend
          python -m pytest test_*.py -v --tb=short 2>/dev/null || echo "No tests found — skipping"
